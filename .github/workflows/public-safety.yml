name: Public repository safety

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject common secret forms
        shell: bash
        run: |
          set -euo pipefail
          if grep -RIE '(BEGIN (RSA|OPENSSH|EC) PRIVATE KEY|ghp_[A-Za-z0-9]{20,}|sk_live_[A-Za-z0-9]+)' . --exclude-dir=.git; then
            echo 'Possible secret found.'
            exit 1
          fi

