name: Public repository safety

on:
  pull_request:
  push:
    branches: [next]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.12
          cache: true
          experimental: true
      - run: mise run check
