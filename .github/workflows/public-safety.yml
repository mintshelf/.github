name: Public repository safety

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check organization defaults
        run: |
          test -f profile/README.md
          test -f SECURITY.md
          test -f .github/PULL_REQUEST_TEMPLATE.md
      - name: Reject common secret forms
        shell: bash
        run: |
          set -euo pipefail
          if grep -RIE '(BEGIN (RSA|OPENSSH|EC) PRIVATE KEY|ghp_[A-Za-z0-9]{20,}|sk_live_[A-Za-z0-9]+)' . --exclude-dir=.git; then
            echo 'Possible secret found.'
            exit 1
          fi
